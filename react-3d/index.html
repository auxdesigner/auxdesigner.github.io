<!doctype html>
<html lang="en">
  <head>
    <meta class="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>3D UX prototypes</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="../images/lab.svg"
      rel="icon"
      sizes="any"
      type="image/svg+xml"
    />
  </head>

  <body>
    <h1>3D UX prototypes</h1>

    <section>
      <div class="section-content">
        <div class="section-content-summary">
          <h2>3D automated lab simulation</h2>
        </div>

        <div class="section-content-image">
          <div class="image-wrapper">
            <span>Run simulation</span>
            <video autoplay loop muted playsinline controls>
              <source src="r_move.mp4" type="video/mp4" />
            </video>
          </div>

          <div class="image-wrapper">
            <span>Hover on object</span>
            <video autoplay loop muted playsinline controls>
              <source src="r_hover.mp4" type="video/mp4" />
            </video>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="section-content">
        <div class="section-content-summary">
          <h2>3D surface plot</h2>
        </div>

        <div class="section-content-image">
          <div class="image-wrapper">
            <span>Slider to control range</span>
            <video autoplay loop muted playsinline controls>
              <source src="plot1.mp4" type="video/mp4" />
            </video>
          </div>

          <div class="image-wrapper">
            <span>Hover on chart</span>
            <video autoplay loop muted playsinline controls>
              <source src="plot2.mp4" type="video/mp4" />
            </video>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
